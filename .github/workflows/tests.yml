name: Tests

on:
  push:
    branches:
      - trunk
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Unit tests — PHP matrix, no Docker needed, fast
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-php${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-php${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run unit tests
        run: composer test:unit

  # ---------------------------------------------------------------------------
  # Job 2: WordPress integration tests — wp-env (Docker), PHP 8.3
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests (wp-env)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-php8.3-${{ hashFiles('composer.lock') }}
          restore-keys: composer-php8.3-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Cache wp-env Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.wp-env-cache
          key: wp-env-${{ hashFiles('.wp-env.json') }}
          restore-keys: wp-env-

      - name: Start wp-env
        run: npx wp-env start
        timeout-minutes: 10

      - name: Run integration tests
        run: |
          npx wp-env run tests-cli sh -c \
            "cd /var/www/html/wp-content/plugins/woocommerce-for-paygent-payment-main && \
             php vendor/bin/phpunit -c phpunit-integration.xml.dist 2>&1"

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop

  # ---------------------------------------------------------------------------
  # Job 3: PHPCS — WordPress Coding Standards (reporting only, non-blocking)
  # ---------------------------------------------------------------------------
  phpcs:
    name: PHPCS
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2, cs2pr

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-phpcs-${{ hashFiles('composer.lock') }}
          restore-keys: composer-phpcs-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPCS
        run: vendor/bin/phpcs --report=checkstyle | cs2pr
        continue-on-error: true
